<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Forge fire gradient - deep to bright -->
    <linearGradient id="forge-fire" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#7C2D12"/>
      <stop offset="25%" stop-color="#C2410C"/>
      <stop offset="50%" stop-color="#EA580C"/>
      <stop offset="75%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>

    <!-- Bracket glow gradient -->
    <linearGradient id="bracket-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="40%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>

    <!-- Steel gradient - polished metal -->
    <linearGradient id="steel-polish" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="15%" stop-color="#E2E8F0"/>
      <stop offset="40%" stop-color="#94A3B8"/>
      <stop offset="60%" stop-color="#CBD5E1"/>
      <stop offset="85%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <!-- Anvil face highlight -->
    <linearGradient id="anvil-face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="30%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>

    <!-- Anvil dark side -->
    <linearGradient id="anvil-shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>

    <!-- Background radial - subtle furnace glow -->
    <radialGradient id="bg-glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#1E1208" />
      <stop offset="40%" stop-color="#130D06"/>
      <stop offset="100%" stop-color="#09090B"/>
    </radialGradient>

    <!-- Ambient heat haze -->
    <radialGradient id="heat-haze" cx="50%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>

    <!-- Slash gradient -->
    <linearGradient id="slash-hot" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>

    <!-- Glow filter - tight -->
    <filter id="glow-tight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter - wide ambient -->
    <filter id="glow-wide" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Spark glow -->
    <filter id="spark-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for anvil -->
    <filter id="anvil-drop" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Inner bevel for anvil face -->
    <filter id="bevel">
      <feSpecularLighting surfaceScale="3" specularConstant="0.6" specularExponent="25" lighting-color="#FFFFFF" result="specular">
        <fePointLight x="256" y="200" z="120"/>
      </feSpecularLighting>
      <feComposite in="specular" in2="SourceAlpha" operator="in" result="specularOut"/>
      <feComposite in="SourceGraphic" in2="specularOut" operator="arithmetic" k1="0" k2="1" k3="0.3" k4="0"/>
    </filter>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->

  <!-- Deep dark background -->
  <circle cx="256" cy="256" r="250" fill="url(#bg-glow)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#1C1917" stroke-width="1"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#292524" stroke-width="0.5"/>

  <!-- Heat haze ambient glow behind forge area -->
  <circle cx="256" cy="290" r="180" fill="url(#heat-haze)"/>

  <!-- ==================== ANVIL (detailed) ==================== -->
  <g filter="url(#anvil-drop)">

    <!-- Anvil base/pedestal -->
    <path d="M185 385 L327 385 L335 395 Q340 410 330 415 L182 415 Q172 410 177 395 Z" fill="#334155"/>
    <!-- Base texture line -->
    <line x1="190" y1="400" x2="322" y2="400" stroke="#3F3F46" stroke-width="0.8"/>
    <line x1="188" y1="405" x2="324" y2="405" stroke="#27272A" stroke-width="0.5"/>

    <!-- Anvil waist (narrow middle) -->
    <path d="M200 355 L312 355 L327 385 L185 385 Z" fill="#475569"/>
    <!-- Waist shadow line -->
    <line x1="205" y1="365" x2="307" y2="365" stroke="#334155" stroke-width="1"/>

    <!-- Anvil body (main mass) -->
    <path d="M175 320 L337 320 L312 355 L200 355 Z" fill="url(#anvil-face)"/>
    <!-- Body highlight edge -->
    <line x1="180" y1="322" x2="332" y2="322" stroke="#F1F5F9" stroke-width="0.8" opacity="0.6"/>

    <!-- Anvil face (top working surface) - with bevel filter -->
    <g filter="url(#bevel)">
      <path d="M168 295 L344 295 L337 320 L175 320 Z" fill="url(#steel-polish)"/>
    </g>
    <!-- Face top edge highlight -->
    <line x1="172" y1="296" x2="340" y2="296" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <!-- Face bottom edge -->
    <line x1="176" y1="319" x2="336" y2="319" stroke="#475569" stroke-width="0.8"/>

    <!-- Hardy hole (square hole in anvil face) -->
    <rect x="290" y="300" width="10" height="10" rx="1" fill="#1E293B"/>
    <rect x="291" y="301" width="8" height="8" rx="1" fill="#0F172A"/>

    <!-- Pritchel hole (round hole) -->
    <circle cx="315" cy="305" r="4" fill="#1E293B"/>
    <circle cx="315" cy="305" r="3" fill="#0F172A"/>

    <!-- Anvil horn (left tapered) -->
    <path d="M168 295 L168 320 L105 325 Q88 326 86 318 Q84 310 95 306 L168 295 Z" fill="url(#anvil-shadow)"/>
    <!-- Horn top highlight -->
    <path d="M168 295 L95 306 Q88 307 90 303 L168 295 Z" fill="#94A3B8" opacity="0.5"/>
    <!-- Horn edge detail -->
    <line x1="100" y1="310" x2="165" y2="300" stroke="#64748B" stroke-width="0.5"/>
    <!-- Horn tip highlight -->
    <circle cx="88" cy="314" r="3" fill="#94A3B8" opacity="0.3"/>

    <!-- Anvil heel (right squared) -->
    <path d="M344 295 L380 298 Q390 300 390 310 Q390 320 380 322 L337 320 Z" fill="url(#anvil-shadow)"/>
    <!-- Heel edge highlight -->
    <line x1="345" y1="296" x2="378" y2="299" stroke="#94A3B8" stroke-width="0.5" opacity="0.4"/>

    <!-- Step (ledge between face and horn) -->
    <path d="M168 295 L168 308 L160 310 L160 297 Z" fill="#64748B"/>
  </g>

  <!-- ==================== CODE BRACKETS ==================== -->

  <!-- Left bracket < with glow -->
  <g filter="url(#glow-wide)">
    <path d="M195 150 L130 222 L195 294" stroke="url(#bracket-glow)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
  </g>
  <g filter="url(#glow-tight)">
    <path d="M195 150 L130 222 L195 294" stroke="url(#bracket-glow)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Right bracket > with glow -->
  <g filter="url(#glow-wide)">
    <path d="M317 150 L382 222 L317 294" stroke="url(#bracket-glow)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
  </g>
  <g filter="url(#glow-tight)">
    <path d="M317 150 L382 222 L317 294" stroke="url(#bracket-glow)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ==================== FORWARD SLASH (hot metal) ==================== -->

  <g filter="url(#glow-wide)">
    <line x1="278" y1="138" x2="234" y2="296" stroke="#FDE68A" stroke-width="14" stroke-linecap="round" opacity="0.25"/>
  </g>
  <g filter="url(#glow-tight)">
    <line x1="278" y1="138" x2="234" y2="296" stroke="url(#slash-hot)" stroke-width="11" stroke-linecap="round"/>
  </g>
  <!-- Hot white core of the slash -->
  <line x1="276" y1="145" x2="236" y2="290" stroke="#FEF3C7" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- ==================== SPARKS & EMBERS ==================== -->

  <!-- Large sparks flying up from impact point -->
  <g filter="url(#spark-glow)">
    <circle cx="210" cy="270" r="3.5" fill="#FDE68A">
      <animate attributeName="cy" values="270;255;270" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="265" r="3" fill="#FB923C">
      <animate attributeName="cy" values="265;248;265" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="280" r="4" fill="#FDE68A">
      <animate attributeName="cy" values="280;260;280" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Medium sparks -->
  <g filter="url(#spark-glow)">
    <circle cx="185" cy="278" r="2.5" fill="#FDBA74">
      <animate attributeName="cx" values="185;178;185" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.1;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="275" r="2" fill="#F97316">
      <animate attributeName="cx" values="320;328;320" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="230" cy="288" r="2.5" fill="#FDE68A">
      <animate attributeName="cy" values="288;275;288" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="275" cy="285" r="2" fill="#FDBA74">
      <animate attributeName="cy" values="285;270;285" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.15;0.8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tiny ember particles scattered -->
  <circle cx="170" cy="285" r="1.5" fill="#FB923C" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="280" r="1" fill="#F97316" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="260" r="1.2" fill="#FDE68A" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="290" cy="258" r="1" fill="#FDBA74" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="250" r="1.5" fill="#FB923C" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="252" r="1.2" fill="#FDE68A" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- ==================== FORGE FIRE (behind/below brackets) ==================== -->

  <!-- Subtle fire glow at the base of the code area -->
  <ellipse cx="256" cy="296" rx="80" ry="12" fill="#F97316" opacity="0.08"/>
  <ellipse cx="256" cy="296" rx="50" ry="6" fill="#FDBA74" opacity="0.06"/>

  <!-- ==================== OUTER RING DETAIL ==================== -->

  <!-- Decorative outer ring with subtle segments -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#292524" stroke-width="2"/>
  <circle cx="256" cy="256" r="237" fill="none" stroke="#1C1917" stroke-width="0.5"/>

  <!-- Four cardinal notches on outer ring -->
  <line x1="256" y1="16" x2="256" y2="24" stroke="#44403C" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="488" x2="256" y2="496" stroke="#44403C" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="256" x2="24" y2="256" stroke="#44403C" stroke-width="2" stroke-linecap="round"/>
  <line x1="488" y1="256" x2="496" y2="256" stroke="#44403C" stroke-width="2" stroke-linecap="round"/>
</svg>
