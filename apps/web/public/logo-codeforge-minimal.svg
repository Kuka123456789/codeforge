<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="ember" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="20" y="20" width="360" height="360" rx="80" fill="#0C0A09"/>

  <!-- Code brackets forming a shield/forge shape -->
  <!-- Left bracket -->
  <path d="M130 120 L80 200 L130 280" stroke="url(#ember)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right bracket -->
  <path d="M270 120 L320 200 L270 280" stroke="url(#ember)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Anvil/hammer icon in center -->
  <!-- Hammer head -->
  <rect x="168" y="148" width="64" height="32" rx="6" fill="url(#steel)" transform="rotate(-30 200 164)"/>

  <!-- Hammer handle -->
  <line x1="200" y1="178" x2="200" y2="260" stroke="#CBD5E1" stroke-width="10" stroke-linecap="round"/>

  <!-- Anvil surface -->
  <path d="M155 260 L245 260 L255 275 Q255 290 245 290 L155 290 Q145 290 145 275 Z" fill="url(#steel)" opacity="0.85"/>

  <!-- Spark -->
  <circle cx="175" cy="155" r="4" fill="#FDBA74"/>
  <circle cx="160" cy="142" r="2.5" fill="#FB923C" opacity="0.7"/>
  <circle cx="182" cy="138" r="2" fill="#FED7AA" opacity="0.6"/>
</svg>
