<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="fire" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="40%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#A1A1AA"/>
    </linearGradient>
    <filter id="inner-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="400" height="400" rx="90" fill="#09090B"/>

  <!-- Subtle ring -->
  <rect x="30" y="30" width="340" height="340" rx="70" fill="none" stroke="#27272A" stroke-width="1.5"/>

  <!-- C that looks like a code bracket / forge opening -->
  <g filter="url(#inner-glow)">
    <!-- The C shape - open on the right like a forge mouth -->
    <path d="M248 95
             Q170 95 130 145
             Q90 195 90 200
             Q90 205 130 255
             Q170 305 248 305"
          stroke="url(#fire)" stroke-width="28" stroke-linecap="round" fill="none"/>
  </g>

  <!-- F built into the C opening -->
  <g filter="url(#inner-glow)">
    <!-- F vertical stroke -->
    <line x1="220" y1="135" x2="220" y2="275" stroke="url(#chrome)" stroke-width="22" stroke-linecap="round"/>
    <!-- F top horizontal -->
    <line x1="220" y1="135" x2="310" y2="135" stroke="url(#chrome)" stroke-width="22" stroke-linecap="round"/>
    <!-- F middle horizontal -->
    <line x1="220" y1="200" x2="290" y2="200" stroke="url(#chrome)" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- Spark/ember accents -->
  <circle cx="320" cy="118" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="335" cy="135" r="3" fill="#FB923C" opacity="0.5"/>
  <circle cx="305" cy="105" r="2.5" fill="#FDE68A" opacity="0.6"/>
</svg>
